name: Build Flutter

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target (apk --release / apk --debug)'
        required: true
        default: 'apk --release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter
        run: flutter build ${{ github.event.inputs.build_target }}

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: flutter-build
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          
