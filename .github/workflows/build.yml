name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'URL download project zip (Catbox)'
        required: true
      chat_id:
        description: 'Telegram chat ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download project
        run: wget -O project.zip "${{ github.event.inputs.download_url }}"
      
      - name: Extract project
        run: unzip project.zip -d project
      
      - name: Install Flutter (stable terbaru via git)
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      
      - name: Check Flutter & Dart version
        run: |
          $HOME/flutter/bin/flutter --version
          $HOME/flutter/bin/dart --version
      
      - name: Get dependencies
        working-directory: ./project
        run: $HOME/flutter/bin/flutter pub get
      
      - name: Build APK
        working-directory: ./project
        run: $HOME/flutter/bin/flutter build apk --release
      
      - name: Upload APK to Catbox
        id: upload
        run: |
          APK_PATH="./project/build/app/outputs/flutter-apk/app-release.apk"
          URL=$(curl -F "file=@$APK_PATH" https://catbox.moe/user/api.php)
          echo "apk_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ APK uploaded: $URL"
      
      - name: Send APK link to Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ github.event.inputs.chat_id }} \
            -d text="✅ *Build APK selesai!* 🚀\n\n📱 Download APK: ${{ steps.upload.outputs.apk_url }}\n\n🔧 Flutter stable terbaru" \
            -d parse_mode=Markdown
